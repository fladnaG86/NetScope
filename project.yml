name: NetScope
options:
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  bundleIdPrefix: com.netscope
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

targets:
  NetScope:
    type: application
    platform: macOS
    sources:
      - path: Sources/NetScope
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Sources/NetScope/Resources
    dependencies:
      - package: GRDB
    entitlements:
      path: NetScope/Resources/NetScope.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.network.server: true
    info:
      path: NetScope/Info.plist
      properties:
        CFBundleName: NetScope
        CFBundleDisplayName: NetScope
        CFBundleIdentifier: com.netscope.NetScope
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: '1.0.0'
        CFBundleVersion: '1'
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHighResolutionCapable: true
        LSUIElement: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.netscope.NetScope
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_PREVIEWS: true
        SWIFT_EMIT_LOC_STRINGS: true
        CODE_SIGN_ENTITLEMENTS: NetScope/Resources/NetScope.entitlements

  NetScopeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/NetScopeTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: NetScope
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.netscope.NetScopeTests
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
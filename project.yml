name: NetScope
options:
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  bundleIdPrefix: com.netscope
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

targets:
  NetScope:
    type: application
    platform: macOS
    sources:
      - path: NetScope
        excludes:
          - "**/.DS_Store"
    resources:
      - path: NetScope/Resources
    dependencies:
      - package: GRDB
    entitlements:
      path: NetScope/Resources/NetScope.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.netscope.NetScope
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_PREVIEWS: true
        SWIFT_EMIT_LOC_STRINGS: true
        CODE_SIGN_ENTITLEMENTS: NetScope/Resources/NetScope.entitlements

  NetScopeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: NetScopeTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: NetScope
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.netscope.NetScopeTests
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"